name: 🚀 Auto FTP Deploy to shoplenca
on:
  push:
    branches:
      - main

jobs:
  ftp-deploy:
    name: Upload Entire Repo to /monieflow
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout repo
        uses: actions/checkout@v4

      - name: 🚀 Upload to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.HOSTNAME }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          server-dir: ./htdocs/        # Remote path (adjust if needed)
          local-dir: ./           # Upload local project root
          exclude: |
            **/.git*
            **/.github*
            **/node_modules/**
            **/vendor/**
            **/uploads/**